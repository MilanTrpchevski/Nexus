<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>NEXIUSE — Web Design & Digital Marketing Agency</title>
    <meta name="description" content="NEXIUSE builds fast, modern websites and runs SEO, social media, and ad campaigns for local businesses in Macedonia. Get a free consultation today." />
    <meta name="keywords" content="web design Macedonia, digital marketing Skopje, SEO Macedonia, website development Skopje, social media management Macedonia" />
    <link rel="canonical" href="https://nexiuse.com/" />
    <link rel="alternate" hreflang="en" href="https://nexiuse.com/en" />
    <link rel="alternate" hreflang="mk" href="https://nexiuse.com/mk" />
    <link rel="alternate" hreflang="x-default" href="https://nexiuse.com/en" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NEXIUSE — Web Design & Digital Marketing Agency in Skopje" />
    <meta property="og:description" content="Fast websites, SEO, and digital marketing for local businesses in Macedonia." />
    <meta property="og:url" content="https://nexiuse.com/" />
    <meta property="og:image" content="https://nexiuse.com/og-image.jpg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="mk_MK" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NEXIUSE — Web Design & Digital Marketing Agency" />
    <meta name="twitter:description" content="Fast websites, SEO, and digital marketing for local businesses in Macedonia." />
    <meta name="twitter:image" content="https://nexiuse.com/og-image.jpg" />

    <!-- Google Search Console verification — replace with your own code -->
    <meta name="google-site-verification" content="REPLACE_WITH_YOUR_VERIFICATION_CODE" />

    <!-- Structured data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "NEXIUSE",
      "description": "Web design and digital marketing agency serving local businesses in Macedonia.",
      "url": "https://nexiuse.com",
      "areaServed": {
        "@type": "Country",
        "name": "North Macedonia"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Skopje",
        "addressCountry": "MK"
      },
      "availableLanguage": ["English", "Macedonian"],
      "sameAs": [
        "https://www.instagram.com/nexiuse"
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>

    <!--
      Netlify Forms detection form.
      This static, hidden form is scanned at BUILD TIME by Netlify's bots
      so it knows about the "contact" form and its fields.
      The real, interactive form rendered by React submits to this same
      form name via fetch() — see Contact.jsx.
      Do not remove this even though it's never shown to users.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="user_name" />
      <input type="email" name="user_email" />
      <input type="text" name="company" />
      <input type="tel" name="user_phone" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
