<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS — Digital Marketing & Web Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>

    <!--
      Netlify Forms detection form.
      This static, hidden form is scanned at BUILD TIME by Netlify's bots
      so it knows about the "contact" form and its fields.
      The real, interactive form rendered by React submits to this same
      form name via fetch() — see Contact.jsx.
      Do not remove this even though it's never shown to users.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="user_name" />
      <input type="email" name="user_email" />
      <input type="text" name="company" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
